<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encuentro Romántico</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Arial, sans-serif; }
    canvas { display: block; }

    #ui-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }
    #clue-counter {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      color: #fff; font-size: 18px; background: rgba(0,0,0,0.6);
      padding: 8px 20px; border-radius: 20px; font-weight: 600;
      letter-spacing: 1px; border: 1px solid rgba(255,255,255,0.2);
    }
    #dialogue-box {
      position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
      width: 80%; max-width: 600px;
      background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px; padding: 20px 28px;
      color: #fff; font-size: 17px; line-height: 1.6;
      opacity: 0; transition: opacity 0.5s ease;
      backdrop-filter: blur(8px);
    }
    #dialogue-box.visible { opacity: 1; }
    #interact-hint {
      position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%);
      color: #ffd700; font-size: 14px; background: rgba(0,0,0,0.5);
      padding: 6px 16px; border-radius: 12px;
      opacity: 0; transition: opacity 0.3s;
    }
    #interact-hint.visible { opacity: 1; }

    #controls-hint {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.4); font-size: 13px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

<div id="ui-overlay">
  <div id="clue-counter">✦ Pista 0 / 6</div>
  <div id="interact-hint">Presiona ESPACIO para interactuar</div>
  <div id="dialogue-box"></div>
  <div id="controls-hint">← →  para girar el mundo</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 30, 50);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 10, 16);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
scene.add(ambientLight);

const hemisphereLight = new THREE.HemisphereLight(0x87CEEB, 0x3a7d44, 0.6);
scene.add(hemisphereLight);

const sunLight = new THREE.DirectionalLight(0xffeedd, 1.8);
sunLight.position.set(10, 20, 5);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 1024;
sunLight.shadow.mapSize.height = 1024;
sunLight.shadow.camera.near = 0.1;
sunLight.shadow.camera.far = 40;
sunLight.shadow.camera.left = -20;
sunLight.shadow.camera.right = 20;
sunLight.shadow.camera.top = 20;
sunLight.shadow.camera.bottom = -20;
scene.add(sunLight);

// --- World Group (rotates) ---
const worldGroup = new THREE.Group();
scene.add(worldGroup);

// --- Ground ---
const groundGeometry = new THREE.CircleGeometry(18, 64);
const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x4a9e4a, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
worldGroup.add(ground);

// --- Animation Loop ---
function animate() {
  updateInteraction();
  requestAnimationFrame(animate);

  const rotSpeed = 0.02;
  if (keys.left) worldGroup.rotation.y += rotSpeed;
  if (keys.right) worldGroup.rotation.y -= rotSpeed;

  // Girl bob
  girlTime += 0.03;
  girl.position.y = Math.sin(girlTime) * 0.05;

  // Face the direction of movement
  if (keys.left) girl.rotation.y = Math.PI / 4;
  else if (keys.right) girl.rotation.y = -Math.PI / 4;
  else girl.rotation.y = 0;

  // Animate NPC float
  worldGroup.children.forEach((child) => {
    if (child.userData && child.userData.floatOffset !== undefined) {
      const floatY = Math.sin(girlTime * 2 + child.userData.floatOffset) * 0.1;
      child.position.y = floatY;
      if (child.userData.glow) {
        child.userData.glow.material.opacity = 0.3 + Math.sin(girlTime * 3 + child.userData.floatOffset) * 0.2;
      }
    }
  });

  // Animate encounter hearts
  const hPos = hearts.geometry.attributes.position.array;
  for (let i = 0; i < heartCount; i++) {
    hPos[i * 3 + 1] += heartSpeeds[i].y;
    if (hPos[i * 3 + 1] > 3.5) hPos[i * 3 + 1] = 0;
  }
  hearts.geometry.attributes.position.needsUpdate = true;

  // Animate bouquet sway
  bouquet.rotation.z = Math.sin(girlTime * 1.5) * 0.1;

  // Check ending
  checkEnding();

  renderer.render(scene, camera);
}
animate();

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Placeholder exports for other tasks ---
window.__scene = scene;
window.__camera = camera;
window.__worldGroup = worldGroup;
window.__renderer = renderer;

// --- Girl Character ---
function createGirl() {
  const group = new THREE.Group();

  // Body (dress)
  const bodyGeo = new THREE.CylinderGeometry(0.5, 0.7, 1.2, 8);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff6b9d, roughness: 0.3 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.6;
  body.castShadow = true;
  group.add(body);

  // Head
  const headGeo = new THREE.SphereGeometry(0.35, 12, 12);
  const headMat = new THREE.MeshStandardMaterial({ color: 0xfde8d0, roughness: 0.2 });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 1.4;
  head.castShadow = true;
  group.add(head);

  // Hair
  const hairGeo = new THREE.SphereGeometry(0.37, 12, 12, 0, Math.PI * 2, 0, Math.PI / 2);
  const hairMat = new THREE.MeshStandardMaterial({ color: 0x4a2800, roughness: 1 });
  const hair = new THREE.Mesh(hairGeo, hairMat);
  hair.position.y = 1.55;
  hair.scale.y = 0.6;
  group.add(hair);

  // Eyes
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0x2d1b00 });
  for (const side of [-1, 1]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), eyeMat);
    eye.position.set(side * 0.15, 1.45, 0.32);
    group.add(eye);
  }

  // Arms
  const armMat = new THREE.MeshStandardMaterial({ color: 0xfde8d0, roughness: 0.2 });
  for (const side of [-1, 1]) {
    const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.6, 6), armMat);
    arm.position.set(side * 0.55, 1.0, 0);
    arm.rotation.z = side * 0.2;
    arm.castShadow = true;
    group.add(arm);
  }

  // Legs
  const legMat = new THREE.MeshStandardMaterial({ color: 0xfde8d0, roughness: 0.3 });
  for (const side of [-1, 1]) {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, 0.5, 6), legMat);
    leg.position.set(side * 0.2, 0.25, 0);
    leg.castShadow = true;
    group.add(leg);
  }

  // Shoes
  const shoeMat = new THREE.MeshStandardMaterial({ color: 0xff6b9d, roughness: 0.5 });
  for (const side of [-1, 1]) {
    const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.08, 0.28), shoeMat);
    shoe.position.set(side * 0.2, 0.04, 0.05);
    group.add(shoe);
  }

  return group;
}

const girl = createGirl();
scene.add(girl);

// Girl idle animation (gentle bob)
let girlTime = 0;

// --- Biomes ---
const biomeColors = {
  garden:     { ground: 0x7ec87e, decor: 0xff69b4, name: 'Jardín de Flores' },
  forest:     { ground: 0x2d7d2d, decor: 0x228B22, name: 'Bosque Encantado' },
  beach:      { ground: 0xf4d03f, decor: 0x85c1e9, name: 'Playa al Atardecer' },
  plaza:      { ground: 0xcc9966, decor: 0xc0392b, name: 'Plaza de la Ciudad' },
  bridge:     { ground: 0x8b7d6b, decor: 0x6c5ce7, name: 'Puente Mirador' },
  encounter:  { ground: 0xffb6c1, decor: 0xff1493, name: 'El Encuentro' },
};

const biomeData = [
  { id: 'garden',    angleStart: 0,     angleEnd: Math.PI / 3,  clueIndex: 0 },
  { id: 'forest',    angleStart: Math.PI / 3,   angleEnd: 2 * Math.PI / 3, clueIndex: 1 },
  { id: 'beach',     angleStart: 2 * Math.PI / 3, angleEnd: Math.PI,       clueIndex: 2 },
  { id: 'plaza',     angleStart: Math.PI,        angleEnd: 4 * Math.PI / 3, clueIndex: 3 },
  { id: 'bridge',    angleStart: 4 * Math.PI / 3, angleEnd: 5 * Math.PI / 3, clueIndex: 4 },
  { id: 'encounter', angleStart: 5 * Math.PI / 3, angleEnd: 2 * Math.PI,    clueIndex: 5 },
];

function createBiomeSector(biome, data) {
  const group = new THREE.Group();
  const colors = biomeColors[biome.id];
  const midAngle = (data.angleStart + data.angleEnd) / 2;
  const radius = 14;

  // Colored ground wedge
  const wedgeShape = new THREE.Shape();
  wedgeShape.moveTo(0, 0);
  const steps = 16;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const a = data.angleStart + (data.angleEnd - data.angleStart) * t;
    wedgeShape.lineTo(Math.cos(a) * radius, Math.sin(a) * radius);
  }
  wedgeShape.lineTo(0, 0);

  const wedgeGeo = new THREE.ShapeGeometry(wedgeShape);
  const wedgeMat = new THREE.MeshStandardMaterial({ color: colors.ground, roughness: 0.9, side: THREE.DoubleSide });
  const wedge = new THREE.Mesh(wedgeGeo, wedgeMat);
  wedge.rotation.x = -Math.PI / 2;
  wedge.position.y = 0.01;
  wedge.receiveShadow = true;
  group.add(wedge);

  // Decorations
  switch (biome.id) {
    case 'garden': {
      for (let i = 0; i < 12; i++) {
        const a = data.angleStart + Math.random() * (data.angleEnd - data.angleStart);
        const r = 2 + Math.random() * 8;
        const flower = new THREE.Mesh(
          new THREE.SphereGeometry(0.1 + Math.random() * 0.1, 6, 6),
          new THREE.MeshStandardMaterial({ color: Math.random() > 0.5 ? 0xff69b4 : 0xffeb3b })
        );
        flower.position.set(Math.cos(a) * r, 0.1, Math.sin(a) * r);
        group.add(flower);
      }
      for (let i = 0; i < 4; i++) {
        const a = data.angleStart + Math.random() * (data.angleEnd - data.angleStart);
        const r = 3 + Math.random() * 6;
        const bush = new THREE.Mesh(
          new THREE.SphereGeometry(0.4, 6, 6),
          new THREE.MeshStandardMaterial({ color: 0x2d8a2d })
        );
        bush.position.set(Math.cos(a) * r, 0.3, Math.sin(a) * r);
        group.add(bush);
      }
      break;
    }
    case 'forest': {
      for (let i = 0; i < 8; i++) {
        const a = data.angleStart + Math.random() * (data.angleEnd - data.angleStart);
        const r = 2 + Math.random() * 8;
        const trunk = new THREE.Mesh(
          new THREE.CylinderGeometry(0.15, 0.25, 1.5, 6),
          new THREE.MeshStandardMaterial({ color: 0x8B4513 })
        );
        trunk.position.set(Math.cos(a) * r, 0.75, Math.sin(a) * r);
        trunk.castShadow = true;
        group.add(trunk);
        const foliage = new THREE.Mesh(
          new THREE.SphereGeometry(0.8, 6, 6),
          new THREE.MeshStandardMaterial({ color: 0x228B22 })
        );
        foliage.position.set(Math.cos(a) * r, 1.8, Math.sin(a) * r);
        foliage.castShadow = true;
        group.add(foliage);
      }
      break;
    }
    case 'beach': {
      for (let i = 0; i < 3; i++) {
        const a = data.angleStart + Math.random() * (data.angleEnd - data.angleStart);
        const r = 13 + Math.random() * 2;
        const water = new THREE.Mesh(
          new THREE.CircleGeometry(1.5, 12),
          new THREE.MeshStandardMaterial({ color: 0x3498db, transparent: true, opacity: 0.5 })
        );
        water.position.set(Math.cos(a) * r, 0.05, Math.sin(a) * r);
        water.rotation.x = -Math.PI / 2;
        group.add(water);
      }
      for (let i = 0; i < 3; i++) {
        const a = data.angleStart + Math.random() * (data.angleEnd - data.angleStart);
        const r = 4 + Math.random() * 4;
        const trunk = new THREE.Mesh(
          new THREE.CylinderGeometry(0.1, 0.2, 1.8, 6),
          new THREE.MeshStandardMaterial({ color: 0x8B4513 })
        );
        trunk.position.set(Math.cos(a) * r, 0.9, Math.sin(a) * r);
        trunk.castShadow = true;
        group.add(trunk);
        const fronds = new THREE.Mesh(
          new THREE.SphereGeometry(0.7, 6, 6),
          new THREE.MeshStandardMaterial({ color: 0x2d8a2d })
        );
        fronds.position.set(Math.cos(a) * r, 2.1, Math.sin(a) * r);
        fronds.scale.y = 0.3;
        group.add(fronds);
      }
      break;
    }
    case 'plaza': {
      for (let i = 0; i < 4; i++) {
        const a = data.angleStart + Math.random() * (data.angleEnd - data.angleStart);
        const r = 3 + Math.random() * 5;
        const post = new THREE.Mesh(
          new THREE.CylinderGeometry(0.06, 0.08, 1.2, 6),
          new THREE.MeshStandardMaterial({ color: 0x555555 })
        );
        post.position.set(Math.cos(a) * r, 0.6, Math.sin(a) * r);
        group.add(post);
        const lamp = new THREE.Mesh(
          new THREE.SphereGeometry(0.15, 8, 8),
          new THREE.MeshStandardMaterial({ color: 0xffdd44, emissive: 0xffdd44, emissiveIntensity: 0.3 })
        );
        lamp.position.set(Math.cos(a) * r, 1.3, Math.sin(a) * r);
        group.add(lamp);
      }
      for (let i = 0; i < 3; i++) {
        const a = data.angleStart + Math.random() * (data.angleEnd - data.angleStart);
        const r = 7 + Math.random() * 4;
        const building = new THREE.Mesh(
          new THREE.BoxGeometry(0.8, 0.6 + Math.random() * 0.5, 0.8),
          new THREE.MeshStandardMaterial({ color: 0xe8d5b7 })
        );
        building.position.set(Math.cos(a) * r, 0.3, Math.sin(a) * r);
        building.castShadow = true;
        group.add(building);
      }
      break;
    }
    case 'bridge': {
      for (let i = 0; i < 5; i++) {
        const a = data.angleStart + (data.angleEnd - data.angleStart) * (i / 5);
        const r = 6;
        const arch = new THREE.Mesh(
          new THREE.BoxGeometry(0.6, 0.1, 0.6),
          new THREE.MeshStandardMaterial({ color: 0x8B7D6B })
        );
        arch.position.set(Math.cos(a) * r, 1.2 + Math.sin(i * Math.PI / 5) * 0.6, Math.sin(a) * r);
        arch.castShadow = true;
        group.add(arch);
      }
      const railingMat = new THREE.MeshStandardMaterial({ color: 0x6c5ce7, emissive: 0x6c5ce7, emissiveIntensity: 0.1 });
      for (let i = 0; i < 4; i++) {
        const a = data.angleStart + (data.angleEnd - data.angleStart) * (i / 4);
        const r = 5.5;
        const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.8, 6), railingMat);
        pillar.position.set(Math.cos(a) * r, 1.4, Math.sin(a) * r);
        group.add(pillar);
      }
      break;
    }
    case 'encounter': {
      for (let i = 0; i < 20; i++) {
        const a = data.angleStart + Math.random() * (data.angleEnd - data.angleStart);
        const r = 2 + Math.random() * 8;
        const heart = new THREE.Mesh(
          new THREE.SphereGeometry(0.08, 6, 6),
          new THREE.MeshStandardMaterial({ color: 0xff1493, emissive: 0xff1493, emissiveIntensity: 0.2 })
        );
        heart.position.set(Math.cos(a) * r, 0.15 + Math.random() * 0.1, Math.sin(a) * r);
        group.add(heart);
      }
      for (let i = 0; i < 8; i++) {
        const a = data.angleStart + (data.angleEnd - data.angleStart) * (i / 8);
        const r = 2 + i * 1.2;
        const carpet = new THREE.Mesh(
          new THREE.PlaneGeometry(0.6, 0.8),
          new THREE.MeshStandardMaterial({ color: 0xcc0000, side: THREE.DoubleSide })
        );
        carpet.position.set(Math.cos(a) * r, 0.05, Math.sin(a) * r);
        carpet.rotation.y = -a + Math.PI / 2;
        carpet.rotation.x = -Math.PI / 2;
        group.add(carpet);
      }
      break;
    }
  }

  // Biome label (colored sphere floating above)
  const label = new THREE.Mesh(
    new THREE.SphereGeometry(0.2, 8, 8),
    new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: colors.decor, emissiveIntensity: 0.3 })
  );
  label.position.set(Math.cos(midAngle) * 8, 3.5, Math.sin(midAngle) * 8);
  group.add(label);

  return group;
}

// Create all biomes
const biomes = {};
biomeData.forEach((data) => {
  const sector = createBiomeSector({ id: data.id }, data);
  worldGroup.add(sector);
  biomes[data.id] = sector;
});

// --- Clue System ---
const clues = [
  {
    npcText: 'Conejo: "Vi a tu amor pasar por aquí, iba hacia el bosque con algo en las manos..."',
    signText: 'Cartel: "Jardín de los Suspiros — donde todo comenzó"',
  },
  {
    npcText: 'Zorro: "Escuché que alguien preparaba algo especial en la playa. ¡Corre!"',
    signText: 'Cartel: "Bosque Encantado — dicen que los enamorados dejan mensajes aquí"',
  },
  {
    npcText: 'Pájaro: "Vi una figura vestida de azul cerca de la plaza del pueblo"',
    signText: 'Cartel: "Playa del Atardecer — el mejor lugar para una declaración"',
  },
  {
    npcText: 'Ardilla: "El chico de la sonrisa bonita preguntó por la floristería más cercana"',
    signText: 'Cartel: "Plaza Central — donde los corazones se encuentran"',
  },
  {
    npcText: 'Ciervo: "Lo vi cruzando el puente... llevaba algo que brillaba"',
    signText: 'Cartel: "Puente de los Suspiros — cruza y encuentra tu destino"',
  },
  {
    npcText: null,
    signText: 'Última pista: "Sigue el camino de pétalos... te está esperando"',
  },
];

// --- Interactive Objects ---
const interactables = [];
let cluesFound = 0;

function createNPC(angle, radius, color, type) {
  const group = new THREE.Group();

  // Body
  const body = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 8, 8),
    new THREE.MeshStandardMaterial({ color, roughness: 0.6 })
  );
  body.position.y = 0.5;
  group.add(body);

  // Head
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.2, 8, 8),
    new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 })
  );
  head.position.y = 0.9;
  group.add(head);

  // Features based on type
  if (type === 'rabbit') {
    for (const side of [-1, 1]) {
      const ear = new THREE.Mesh(
        new THREE.CylinderGeometry(0.04, 0.06, 0.3, 6),
        new THREE.MeshStandardMaterial({ color: 0xffffff })
      );
      ear.position.set(side * 0.12, 1.15, 0);
      ear.rotation.z = side * 0.2;
      group.add(ear);
    }
  } else if (type === 'bird') {
    for (const side of [-1, 1]) {
      const wing = new THREE.Mesh(
        new THREE.ConeGeometry(0.15, 0.25, 6),
        new THREE.MeshStandardMaterial({ color: 0x3498db })
      );
      wing.position.set(side * 0.25, 0.5, 0);
      wing.rotation.z = side * 0.5;
      group.add(wing);
    }
    const beak = new THREE.Mesh(
      new THREE.ConeGeometry(0.04, 0.12, 6),
      new THREE.MeshStandardMaterial({ color: 0xff9900 })
    );
    beak.position.set(0, 0.85, 0.25);
    beak.rotation.x = 0.3;
    group.add(beak);
  } else if (type === 'squirrel') {
    const tail = new THREE.Mesh(
      new THREE.SphereGeometry(0.15, 6, 6),
      new THREE.MeshStandardMaterial({ color: 0xcc7722 })
    );
    tail.position.set(0, 0.4, -0.25);
    tail.scale.set(1, 1, 0.5);
    group.add(tail);
    body.material.color.setHex(0xcc7722);
  } else if (type === 'deer') {
    for (const side of [-1, 1]) {
      const antler = new THREE.Mesh(
        new THREE.CylinderGeometry(0.02, 0.03, 0.3, 4),
        new THREE.MeshStandardMaterial({ color: 0x8B4513 })
      );
      antler.position.set(side * 0.12, 1.1, 0.05);
      antler.rotation.z = side * 0.4;
      group.add(antler);
    }
    body.material.color.setHex(0xcd853f);
  }

  const floatOffset = Math.random() * Math.PI * 2;

  // Glow ring
  const glowGeo = new THREE.RingGeometry(0.35, 0.45, 16);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0xffd700,
    transparent: true,
    opacity: 0.6,
    side: THREE.DoubleSide,
  });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.rotation.x = -Math.PI / 2;
  glow.position.y = -0.1;
  group.add(glow);

  group.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
  group.userData = { floatOffset, glow, type: 'npc' };

  return group;
}

function createSign(angle, radius) {
  const group = new THREE.Group();

  const post = new THREE.Mesh(
    new THREE.CylinderGeometry(0.04, 0.05, 0.8, 6),
    new THREE.MeshStandardMaterial({ color: 0x8B4513 })
  );
  post.position.y = 0.4;
  group.add(post);

  const board = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 0.4, 0.05),
    new THREE.MeshStandardMaterial({ color: 0xf5deb3 })
  );
  board.position.y = 0.85;
  board.castShadow = true;
  group.add(board);

  const glowGeo = new THREE.RingGeometry(0.4, 0.5, 16);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0x00ff88,
    transparent: true,
    opacity: 0.4,
    side: THREE.DoubleSide,
  });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.rotation.x = -Math.PI / 2;
  glow.position.y = 0.85;
  group.add(glow);

  group.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
  group.userData = { glow, type: 'sign' };

  return group;
}

// Place NPCs and signs in biomes (skip encounter biome — it has the boyfriend)
const npcTypes = ['rabbit', 'bird', 'squirrel', 'deer'];
const npcColors = [0xffffff, 0x3498db, 0xcc7722, 0xcd853f];

biomeData.forEach((data, i) => {
  if (data.id === 'encounter') return;
  const midAngle = (data.angleStart + data.angleEnd) / 2;
  const radius = 5.5;

  const npc = createNPC(midAngle, radius, npcColors[i] || 0xffffff, npcTypes[i] || 'rabbit');
  worldGroup.add(npc);
  interactables.push({ mesh: npc, biomeIndex: i, type: 'npc' });

  const sign = createSign(midAngle, radius + 2.5);
  worldGroup.add(sign);
  interactables.push({ mesh: sign, biomeIndex: i, type: 'sign' });
});

// --- Interaction System ---
const dialogueBox = document.getElementById('dialogue-box');
const interactHint = document.getElementById('interact-hint');
const clueCounter = document.getElementById('clue-counter');
let nearInteractable = null;

function updateInteraction() {
  const facingAngle = -worldGroup.rotation.y;
  let normAngle = facingAngle % (Math.PI * 2);
  if (normAngle < 0) normAngle += Math.PI * 2;

  let currentBiomeIndex = -1;
  for (let i = 0; i < biomeData.length; i++) {
    let start = biomeData[i].angleStart;
    let end = biomeData[i].angleEnd;
    if (normAngle >= start && normAngle < end) {
      currentBiomeIndex = i;
      break;
    }
  }

  const nearby = interactables.find(
    (ia) => ia.biomeIndex === currentBiomeIndex && ia.biomeIndex <= cluesFound
  );

  if (nearby) {
    nearInteractable = nearby;
    interactHint.classList.add('visible');
  } else {
    nearInteractable = null;
    interactHint.classList.remove('visible');
  }

  clueCounter.textContent = `✦ Pista ${cluesFound} / 6`;
}

document.addEventListener('keydown', (e) => {
  if ((e.key === ' ' || e.key === 'Enter') && nearInteractable) {
    e.preventDefault();
    const idx = nearInteractable.biomeIndex;
    const clue = clues[idx];
    if (!clue) return;

    const message = nearInteractable.type === 'npc' ? clue.npcText : clue.signText;
    if (!message) return;

    dialogueBox.textContent = message;
    dialogueBox.classList.add('visible');

    if (idx >= cluesFound) {
      cluesFound++;
      clueCounter.textContent = `✦ Pista ${cluesFound} / 6`;
    }

    interactHint.classList.remove('visible');
    nearInteractable = null;
  }
});

// --- Boyfriend Character ---
function createBoyfriend() {
  const group = new THREE.Group();

  // Body (shirt)
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4a90d9, roughness: 0.4 });
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.55, 1.0, 8), bodyMat);
  body.position.y = 0.5;
  body.castShadow = true;
  group.add(body);

  // Pants
  const pantsMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.7 });
  const pants = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.4, 0.5, 8), pantsMat);
  pants.position.y = 0.25;
  group.add(pants);

  // Head
  const headMat = new THREE.MeshStandardMaterial({ color: 0xfde8d0, roughness: 0.2 });
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 12, 12), headMat);
  head.position.y = 1.3;
  head.castShadow = true;
  group.add(head);

  // Hair (short)
  const hairMat = new THREE.MeshStandardMaterial({ color: 0x2c1810, roughness: 1 });
  const hair = new THREE.Mesh(new THREE.SphereGeometry(0.37, 12, 12, 0, Math.PI * 2, 0, Math.PI / 2), hairMat);
  hair.position.y = 1.45;
  hair.scale.y = 0.5;
  group.add(hair);

  // Eyes
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0x1a5276 });
  for (const side of [-1, 1]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), eyeMat);
    eye.position.set(side * 0.15, 1.35, 0.32);
    group.add(eye);
  }

  // Smile
  const smileMat = new THREE.MeshStandardMaterial({ color: 0xcc4444 });
  const smile = new THREE.Mesh(new THREE.TorusGeometry(0.08, 0.02, 6, 12, Math.PI), smileMat);
  smile.position.set(0, 1.25, 0.35);
  smile.rotation.x = -0.2;
  group.add(smile);

  // Arms (reaching forward)
  const armMat = new THREE.MeshStandardMaterial({ color: 0xfde8d0, roughness: 0.2 });
  for (const side of [-1, 1]) {
    const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.5, 6), armMat);
    arm.position.set(side * 0.55, 0.9, 0.1);
    arm.rotation.z = side * 0.3;
    arm.rotation.x = -0.3;
    arm.castShadow = true;
    group.add(arm);
  }

  // Legs
  const legMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.5 });
  for (const side of [-1, 1]) {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, 0.4, 6), legMat);
    leg.position.set(side * 0.2, 0.2, 0);
    leg.castShadow = true;
    group.add(leg);
  }

  // Shoes
  const shoeMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.5 });
  for (const side of [-1, 1]) {
    const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.08, 0.3), shoeMat);
    shoe.position.set(side * 0.2, 0.04, 0.05);
    group.add(shoe);
  }

  return group;
}

const boyfriend = createBoyfriend();

// --- Flowers (Lilies) Bouquet ---
function createBouquet() {
  const group = new THREE.Group();
  const stemMat = new THREE.MeshStandardMaterial({ color: 0x2d8a2d });
  for (let i = 0; i < 5; i++) {
    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.5, 4), stemMat);
    stem.position.set((Math.random() - 0.5) * 0.15, 0.25, (Math.random() - 0.5) * 0.15);
    group.add(stem);
  }
  const petalMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2, emissive: 0xfff8f0, emissiveIntensity: 0.1 });
  const centerMat = new THREE.MeshStandardMaterial({ color: 0xffdd44 });
  for (let i = 0; i < 5; i++) {
    const xOff = (Math.random() - 0.5) * 0.2;
    const zOff = (Math.random() - 0.5) * 0.2;
    for (let p = 0; p < 6; p++) {
      const pAngle = (p / 6) * Math.PI * 2;
      const petal = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 6), petalMat);
      petal.position.set(xOff + Math.cos(pAngle) * 0.07, 0.5, zOff + Math.sin(pAngle) * 0.07);
      petal.scale.set(1, 0.3, 1);
      group.add(petal);
    }
    const center = new THREE.Mesh(new THREE.SphereGeometry(0.03, 6, 6), centerMat);
    center.position.set(xOff, 0.5, zOff);
    group.add(center);
  }
  const wrapMat = new THREE.MeshStandardMaterial({ color: 0xff69b4, roughness: 0.6 });
  const wrap = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.2, 8), wrapMat);
  wrap.position.y = 0.1;
  group.add(wrap);
  return group;
}

const bouquet = createBouquet();

// --- Chocolates Box ---
function createChocolateBox() {
  const group = new THREE.Group();
  const boxMat = new THREE.MeshStandardMaterial({ color: 0x8B0000, roughness: 0.5 });
  const box = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.12, 0.2), boxMat);
  box.position.y = 0.06;
  box.castShadow = true;
  group.add(box);
  const ribbonMat = new THREE.MeshStandardMaterial({ color: 0xffd700 });
  const ribbon1 = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.02, 0.04), ribbonMat);
  ribbon1.position.y = 0.12;
  group.add(ribbon1);
  const ribbon2 = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.02, 0.22), ribbonMat);
  ribbon2.position.y = 0.12;
  group.add(ribbon2);
  const bowMat = new THREE.MeshStandardMaterial({ color: 0xffd700 });
  for (const side of [-1, 1]) {
    const bowLoop = new THREE.Mesh(new THREE.TorusGeometry(0.04, 0.015, 6, 8), bowMat);
    bowLoop.position.set(side * 0.05, 0.16, 0);
    group.add(bowLoop);
  }
  return group;
}

const chocolateBox = createChocolateBox();

// Position in encounter biome
const encounterBiome = biomeData[5];
const encounterMid = (encounterBiome.angleStart + encounterBiome.angleEnd) / 2;
const encounterRadius = 3;

boyfriend.position.set(Math.cos(encounterMid) * encounterRadius, 0, Math.sin(encounterMid) * encounterRadius);
boyfriend.lookAt(0, 1, 0);

bouquet.position.set(Math.cos(encounterMid) * encounterRadius + 0.5, 1.0, Math.sin(encounterMid) * encounterRadius);
chocolateBox.position.set(Math.cos(encounterMid) * encounterRadius - 0.4, 0.8, Math.sin(encounterMid) * encounterRadius);

worldGroup.add(boyfriend);
worldGroup.add(bouquet);
worldGroup.add(chocolateBox);

// Hearts particles
const heartCount = 30;
const heartPositions = new Float32Array(heartCount * 3);
const heartSpeeds = [];
for (let i = 0; i < heartCount; i++) {
  const a = Math.random() * Math.PI * 2;
  const r = 0.5 + Math.random() * 2;
  heartPositions[i * 3] = Math.cos(a) * r;
  heartPositions[i * 3 + 1] = Math.random() * 3;
  heartPositions[i * 3 + 2] = Math.sin(a) * r;
  heartSpeeds.push({ x: (Math.random() - 0.5) * 0.005, y: 0.005 + Math.random() * 0.01, z: (Math.random() - 0.5) * 0.005 });
}
const heartGeo = new THREE.BufferGeometry();
heartGeo.setAttribute('position', new THREE.BufferAttribute(heartPositions, 3));
const heartMat = new THREE.PointsMaterial({ color: 0xff1493, size: 0.12, transparent: true, opacity: 0.7 });
const hearts = new THREE.Points(heartGeo, heartMat);
hearts.position.set(Math.cos(encounterMid) * encounterRadius, 1.5, Math.sin(encounterMid) * encounterRadius);
worldGroup.add(hearts);

// --- Ending Trigger ---
let endingStarted = false;

function checkEnding() {
  if (cluesFound >= 6 && !endingStarted) {
    endingStarted = true;

    const targetAngle = -encounterMid;
    const startRotation = worldGroup.rotation.y;
    let progress = 0;

    function rotateToEncounter() {
      if (progress >= 1) return;
      progress += 0.02;
      worldGroup.rotation.y = startRotation + (targetAngle - startRotation) * Math.min(progress, 1);
      if (progress < 1) requestAnimationFrame(rotateToEncounter);
    }
    rotateToEncounter();

    setTimeout(() => {
      dialogueBox.textContent = '¡Lo encontraste!';
      dialogueBox.classList.add('visible');
      setTimeout(() => {
        dialogueBox.textContent = 'Él se arrodilla y te entrega un ramo de lirios y una caja de chocolates...';
        setTimeout(() => {
          dialogueBox.textContent = '¡Feliz final!';
        }, 3000);
      }, 2500);
    }, 3000);
  }
}

// --- World Rotation ---
const keys = { left: false, right: false };

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
});

document.addEventListener('keyup', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
});
